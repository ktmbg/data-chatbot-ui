<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Chat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }

  /* Login */
  #login-screen { display: flex; align-items: center; justify-content: center; flex: 1; }
  .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 40px; width: 360px; }
  .login-card h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .login-card p { color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; }
  .field input:focus { border-color: #6366f1; }
  .btn-primary { width: 100%; padding: 11px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-primary:hover { background: #4f46e5; }
  .error-msg { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; }

  /* App */
  #app-screen { display: none; flex-direction: column; height: 100vh; }
  .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-badge { font-size: 13px; color: #94a3b8; }
  .logout-btn { font-size: 13px; color: #6366f1; background: none; border: none; cursor: pointer; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .msg { display: flex; gap: 12px; max-width: 820px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .msg.user .msg-bubble { background: #6366f1; color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; width: 100%; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 2px; }
  .msg.user .msg-avatar { background: #6366f1; }
  .msg.assistant .msg-avatar { background: #334155; }

  /* SQL block */
  .sql-block { margin-top: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12px; color: #94a3b8; white-space: pre-wrap; word-break: break-all; }
  .sql-label { font-size: 11px; color: #475569; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Table */
  .data-table-wrap { margin-top: 12px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #0f172a; padding: 8px 12px; text-align: left; color: #94a3b8; font-weight: 500; border-bottom: 1px solid #334155; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
  tr:last-child td { border-bottom: none; }

  /* Chart */
  .chart-wrap { margin-top: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 16px; }

  /* Feedback */
  .feedback-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .feedback-btn { background: none; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px; color: #94a3b8; cursor: pointer; font-size: 14px; transition: all 0.15s; }
  .feedback-btn:hover { border-color: #6366f1; color: #e2e8f0; }
  .feedback-btn.active-up { background: #064e3b; border-color: #10b981; color: #10b981; }
  .feedback-btn.active-down { background: #450a0a; border-color: #ef4444; color: #ef4444; }
  .feedback-label { font-size: 12px; color: #475569; }

  /* Input */
  .input-area { background: #1e293b; border-top: 1px solid #334155; padding: 16px 24px; }
  .input-wrap { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
  .input-wrap input { flex: 1; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 14px; outline: none; }
  .input-wrap input:focus { border-color: #6366f1; }
  .send-btn { padding: 12px 20px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .send-btn:hover { background: #4f46e5; }
  .send-btn:disabled { background: #334155; cursor: not-allowed; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 8px 4px; }
  .typing span { width: 8px; height: 8px; background: #6366f1; border-radius: 50%; animation: bounce 1s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>📊 Data Chat</h1>
    <p>Ask questions about your article performance data</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@company.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <div class="header">
    <h1>📊 Data Chat</h1>
    <div class="header-right">
      <span class="user-badge" id="user-badge"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-wrap">
      <input type="text" id="question-input" placeholder="Ask a question about your data..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
const API = 'https://data-chatbot-4463.onrender.com';
let token = null, userEmail = null, history = [], chartInstances = {};

async function login() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('password').value;
  document.getElementById('login-error').textContent = '';
  try {
    const r = await fetch(`${API}/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pw})
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Login failed');
    token = d.token; userEmail = d.email;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('user-badge').textContent = userEmail;
    addWelcome();
  } catch(e) {
    document.getElementById('login-error').textContent = e.message;
  }
}

function logout() {
  token = null; userEmail = null; history = [];
  document.getElementById('messages').innerHTML = '';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function addWelcome() {
  addAssistantMessage({
    reply: "Hi! I'm your data assistant. Ask me anything about your article performance — pageviews, conversions, revenue, top articles, and more.",
    sql: null, columns: null, rows: null
  }, false);
}

async function sendMessage() {
  const input = document.getElementById('question-input');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;

  addUserMessage(q);
  history.push({role: 'user', content: q});

  const typingId = addTyping();
  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({question: q, history: history.slice(-10)})
    });
    const d = await r.json();
    removeTyping(typingId);
    history.push({role: 'assistant', content: d.reply});
    addAssistantMessage(d, true);
  } catch(e) {
    removeTyping(typingId);
    addAssistantMessage({reply: 'Something went wrong. Please try again.', sql: null, columns: null, rows: null}, false);
  }
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `
    <div class="msg user">
      <div class="msg-avatar">👤</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>`;
  msgs.scrollTop = msgs.scrollHeight;
}

function addAssistantMessage(data, showFeedback) {
  const msgs = document.getElementById('messages');
  const id = 'msg-' + Date.now();
  let inner = `<div>${escHtml(data.reply)}</div>`;

  if (data.sql) {
    inner += `<div class="sql-block"><div class="sql-label">SQL Query</div>${escHtml(data.sql)}</div>`;
  }

  if (data.columns && data.rows && data.rows.length > 0) {
    const chartId = 'chart-' + Date.now();
    // Table
    inner += `<div class="data-table-wrap"><table>
      <tr>${data.columns.map(c => `<th>${escHtml(c)}</th>`).join('')}</tr>
      ${data.rows.slice(0,20).map(r => `<tr>${r.map(v => `<td>${v ?? ''}</td>`).join('')}</tr>`).join('')}
    </table></div>`;
    // Chart if 2 cols and numeric second col
    if (data.columns.length === 2 && data.rows.length > 1 && !isNaN(data.rows[0][1])) {
      inner += `<div class="chart-wrap"><canvas id="${chartId}" height="200"></canvas></div>`;
    }
  }

  if (showFeedback) {
    const msgKey = id;
    window._feedbackData = window._feedbackData || {};
    window._feedbackData[msgKey] = data;
    inner += `<div class="feedback-row">
      <span class="feedback-label">Was this helpful?</span>
      <button class="feedback-btn" id="${id}-up" onclick="giveFeedback('${id}','up')">👍</button>
      <button class="feedback-btn" id="${id}-down" onclick="giveFeedback('${id}','down')">👎</button>
    </div>`;
  }

  msgs.innerHTML += `
    <div class="msg assistant" id="${id}">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">${inner}</div>
    </div>`;
  msgs.scrollTop = msgs.scrollHeight;

  // Render chart after DOM insert
  if (data.columns && data.rows && data.columns.length === 2 && data.rows.length > 1 && !isNaN(data.rows[0][1])) {
    const chartId = document.querySelector(`#${id} canvas`)?.id;
    if (chartId) renderChart(chartId, data.columns, data.rows);
  }
}

function renderChart(canvasId, columns, rows) {
  const ctx = document.getElementById(canvasId)?.getContext('2d');
  if (!ctx) return;
  const labels = rows.map(r => String(r[0]));
  const values = rows.map(r => parseFloat(r[1]) || 0);
  const isTimeSeries = labels.some(l => /\d{4}-\d{2}/.test(l));
  new Chart(ctx, {
    type: isTimeSeries ? 'line' : 'bar',
    data: {
      labels,
      datasets: [{
        label: columns[1],
        data: values,
        backgroundColor: 'rgba(99,102,241,0.5)',
        borderColor: '#6366f1',
        borderWidth: 2,
        tension: 0.3,
        fill: isTimeSeries
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#94a3b8' } } },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } }
      }
    }
  });
}

async function giveFeedback(msgId, fb) {
  const data = (window._feedbackData || {})[msgId] || {};
  document.getElementById(`${msgId}-up`).classList.toggle('active-up', fb === 'up');
  document.getElementById(`${msgId}-down`).classList.toggle('active-down', fb === 'down');
  const lastUserMsg = [...document.querySelectorAll('.msg.user .msg-bubble')].pop()?.textContent || '';
  try {
    await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
      body: JSON.stringify({
        question: lastUserMsg,
        sql_query: data.sql || '',
        answer: data.reply,
        feedback: fb
      })
    });
  } catch(e) { console.error('Feedback error', e); }
}

function addTyping() {
  const id = 'typing-' + Date.now();
  const msgs = document.getElementById('messages');
  msgs.innerHTML += `<div class="msg assistant" id="${id}"><div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
